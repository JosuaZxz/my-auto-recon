name: Automation Recon (24/7)

on:
  # schedule:
  #   - cron: '13,33,53 * * * *' # Dimatikan sementara untuk testing manual
  workflow_dispatch: # Ini yang bikin tombol "Run Workflow" tetap ada

jobs:
  recon-job:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        sniper_id: [1] # Cukup 1 mesin untuk testing
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Cache Seen URLs
        uses: actions/cache@v3
        with:
          path: .seen_urls
          key: seen-urls-cache-${{ github.run_id }}
          restore-keys: |
            seen-urls-cache-

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable libnss3 libgbm-dev dnsutils python3-pip
          sudo ln -sf /usr/bin/google-chrome-stable /usr/bin/google-chrome
          pip3 install uro
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          go install -v github.com/projectdiscovery/katana/cmd/katana@latest
          go install -v github.com/hakluke/hakrawler@latest
          go install -v github.com/tomnomnom/assetfinder@latest
          go install -v github.com/tomnomnom/waybackurls@latest
          go install -v github.com/lc/gau/v2/cmd/gau@latest
          go install -v github.com/tomnomnom/anew@latest
          
          echo "$HOME/go/bin" >> $GITHUB_PATH
          # JURUS KUNCI: Download peluru ke folder yang pasti ada
          /home/runner/go/bin/nuclei -ut -ud /home/runner/nuclei-templates
          
      - name: Run Predator Recon
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          H1_USERNAME: ${{ secrets.H1_USERNAME }}
          H1_API_KEY: ${{ secrets.H1_API_KEY }}
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CRIT: ${{ secrets.TELEGRAM_CRITICAL_ID }}
          TG_GEN: ${{ secrets.TELEGRAM_GENERAL_ID }}
          TG_DATA: ${{ secrets.TELEGRAM_DATA_ID }}
          KATANA_CHROME_PATH: /usr/bin/google-chrome
        run: |
          # 1. SETUP NOTIF CONFIG
          echo "telegram:" > notify-config.yaml
          echo "  - id: \"p1_p2_alerts\"" >> notify-config.yaml
          echo "    telegram_apikey: \"$TG_TOKEN\"" >> notify-config.yaml
          echo "    telegram_chatid: \"$TG_CRIT\"" >> notify-config.yaml
          echo "    format: \"{{data}}\"" >> notify-config.yaml

          # 2. ANTI-COLLISION DELAY
          SLEEP_TIME=$(( (${{ matrix.sniper_id }} - 1) * 40 ))
          echo "⏳ Sniper ${{ matrix.sniper_id }} preparing hyper-speed tools..."
          sleep $SLEEP_TIME

          # --- [MODE TESTING: TARGET KHUSUS VULNWEB] ---
          target_file="targets/test_target.txt"
          program_name="test_target"
          
          echo "🎯 Sniper Special Mission: Engaging $program_name (VULNWEB TEST)"
          mkdir -p "data/$program_name"
          touch .seen_urls

          # STEP 1: DISCOVERY
          subfinder -dL "$target_file" -all -silent -o "data/$program_name/s1.txt" > /dev/null 2>&1 || true
          while read -r domain; do
            echo "$domain" | assetfinder --subs-only >> "data/$program_name/s1.txt" 2>/dev/null || true
          done < "$target_file"
          cat "data/$program_name/s1.txt" | sed 's/*.//g' | tr -d ' ' | sort -u > "data/$program_name/subdomains.txt"

          if [ -s "data/$program_name/subdomains.txt" ]; then
            # STEP 2: HTTPX
            timeout 20m httpx -l "data/$program_name/subdomains.txt" -silent -ip -td -mc 200,301,302,401,403,405 -H "User-Agent: NovaRecon/2026" -o "data/$program_name/active_hosts.txt" > /dev/null 2>&1 || true
            
            if [ -s "data/$program_name/active_hosts.txt" ]; then
                # --- [STEP 3: DEEP SIGHT 3.5 - SMART REDUCTION] ---
                echo "[+] Step 3: Mining Endpoints..."
                awk '{print $1}' data/$program_name/active_hosts.txt | sort -u > data/$program_name/active_urls_clean.tmp
                sed 's|http[s]*://||g' data/$program_name/active_urls_clean.tmp | cut -d'/' -f1 | sort -u > data/$program_name/domains_only.txt
                
                # Mining (Dipersingkat waktunya agar tidak kena Ban)
                timeout 5m bash -c "cat data/$program_name/domains_only.txt | waybackurls > data/$program_name/urls_wayback.txt" || true
                timeout 5m bash -c "cat data/$program_name/active_urls_clean.tmp | hakrawler -subs > data/$program_name/urls_hak.txt" || true
                
                # Katana (Sedikit lebih santai - Depth 2)
                echo "    (Crawling with Katana...)"
                timeout 10m katana -list data/$program_name/active_urls_clean.tmp -system-chrome -headless -no-sandbox -jc -kf all -d 2 -silent -o data/$program_name/urls_katana.txt || true
                
                # GABUNGKAN
                cat data/$program_name/urls_wayback.txt data/$program_name/urls_hak.txt data/$program_name/urls_katana.txt | sort -u > data/$program_name/all_endpoints.txt
                
                # --- SMART FILTER (JURUS URO) ---
                echo "[+] Reducing noise with URO..."
                # 1. Filter ekstensi menarik dulu
                grep -iE '\.js|\.php|\.aspx|\.jsp|\.json|\/api\/|\?|=' data/$program_name/all_endpoints.txt > data/$program_name/pre_uro.txt || cp data/$program_name/all_endpoints.txt data/$program_name/pre_uro.txt
                
                # 2. Pangkas parameter duplikat dengan Uro
                # Tambahkan '|| true' dan fallback cp jika uro gagal/not found
                cat data/$program_name/pre_uro.txt | uro > data/$program_name/filtered_endpoints.txt || cp data/$program_name/pre_uro.txt data/$program_name/filtered_endpoints.txt
                
                echo "✅ Done. Targets filtered from $(wc -l < data/$program_name/all_endpoints.txt) to $(wc -l < data/$program_name/filtered_endpoints.txt)"

                # --- [STEP 4: ENDPOINT SANITIZER (FILTER HARTA KARUN)] ---
                echo "[*] Filtering trash endpoints for High Priority Mission..."
                
                # JURUS PENYARINGAN CERDAS:
                # 1. Ambil yang ada ? atau = (Lubang Input)
                # 2. Ambil ekstensi backend & config (Pintu Belakang)
                # 3. Buang sampah statis (Tembok Beton)
                cat data/$program_name/filtered_endpoints.txt | \
                grep -iE "\?|\=|\.php|\.jsp|\.aspx|\.asp|\.json|\.xml|\.conf|\.env|\.yaml|\.git" | \
                grep -ivE "\.jpg|\.png|\.gif|\.css|\.js|\.woff|\.svg|\.pdf|\.ico|\.ttf|\.otf" | \
                sort -u > data/$program_name/high_priority_targets.txt

                # Hitung target untuk laporan log
                echo "🎯 BATTLE MAP READY: $(wc -l < data/$program_name/high_priority_targets.txt) High Priority Endpoints Found."

                # --- [STEP 5: CORE FUZZING & VULN SCAN (SNIPER DEWASA)] ---
                echo "[+] Step 5: Core Scanning... (High Speed & Polite Mode)"
                
                # LOGIKA: 
                # -rl 15 : Lebih 'sopan' tapi teliti (Saran AI Sebelah)
                # -bs 5  : Bulk size kecil agar payload tidak tumpang tindih
                # -t fuzzing/ -t vulnerabilities/ : Fokus ke peluru paling mematikan
                timeout 50m nuclei -l "data/$program_name/high_priority_targets.txt" \
                  -t /home/runner/nuclei-templates/fuzzing \
                  -t /home/runner/nuclei-templates/vulnerabilities \
                  -severity critical,high,medium \
                  -nmhe -rl 15 -bs 5 -retries 2 -timeout 10 -no-color -silent \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
                  -interactsh-server oast.pro \
                  -stats -stats-interval 60 \
                  -jsonl -o "data/$program_name/nuclei_results.json" || true

                # --- [STEP 6: SENSITIVE SECRETS SCAN (PENCARI KUNCI)] ---
                echo "[+] Step 6: Token Discovery... (Looking for Keys)"
                
                timeout 25m nuclei -l "data/$program_name/high_priority_targets.txt" \
                  -t /home/runner/nuclei-templates/exposures \
                  -tags token,keys,credential,exposure \
                  -severity critical,high,medium \
                  -nmhe -rl 15 -bs 5 -no-color -silent \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
                  -stats -stats-interval 60 \
                  -jsonl -o "data/$program_name/token_results.json" || true
                
                [ -f "data/$program_name/token_results.json" ] && cat "data/$program_name/token_results.json" >> "data/$program_name/nuclei_results.json"

                # --- [STEP 7: AI ANALYSIS] ---
                echo "[+] Step 7: Grandmaster AI Triage processing..."
                PROGRAM_NAME=$program_name python3 scripts/validate.py || true

                # --- [STEP 6: AI ANALYSIS] ---
                echo "[+] Step 6: Grandmaster AI Triage processing..."
                # Hapus '> /dev/null' agar kita bisa lihat jika ada error di validate.py
                PROGRAM_NAME=$program_name python3 scripts/validate.py || true

                # --- [STEP 7: SULTAN NOTIFIKASI] ---
                if [ -d "data/$program_name/alerts/high" ]; then
                  for f in data/$program_name/alerts/high/*.md; do
                    [ -e "$f" ] || continue
                    TITLE_CAPTION=$(head -n 1 "$f" | sed 's/# //g' | cut -c1-100)
                    curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
                      -F chat_id="$TG_CRIT" -F document=@"$f" \
                      -F caption="🚨 CRITICAL FOUND: $TITLE_CAPTION" > /dev/null 2>&1
                  done
                fi

                if [ -d "data/$program_name/alerts/low" ]; then
                  for f in data/$program_name/alerts/low/*.md; do
                    [ -e "$f" ] || continue
                    TITLE_CAPTION=$(head -n 1 "$f" | sed 's/# //g' | cut -c1-100)
                    curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
                      -F chat_id="$TG_GEN" -F document=@"$f" \
                      -F caption="⚠️ MEDIUM/LOW FOUND: $TITLE_CAPTION" > /dev/null 2>&1
                  done
                fi

                zip -qj "${program_name}_FULL_DATA.zip" data/$program_name/*.txt data/$program_name/*.json .seen_urls || true
                curl -s -F chat_id="$TG_DATA" -F document=@"${program_name}_FULL_DATA.zip" -F caption="📦 DATABASE: $program_name" "https://api.telegram.org/bot$TG_TOKEN/sendDocument" > /dev/null 2>&1
            fi
          fi

      - name: Sync Database to Repo
        run: |
          git config --local user.email "bot@sniper-recon.ai"
          git config --local user.name "Recon-Sniper-Bot"
          git add .seen_urls
          git commit -m "database: update seen_urls [skip ci]" || exit 0
          git pull --rebase origin main
          git push
